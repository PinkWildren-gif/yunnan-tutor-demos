<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>师缘 — 遇见最懂孩子的老师</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0a0a14;
    color: white;
    overflow: hidden;
  }
  .serif { font-family: "Noto Serif SC", serif; }
  .app-shell {
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 420px 1fr;
    align-items: center;
    justify-items: center;
    background:
      radial-gradient(800px 600px at 20% 30%, rgba(139,92,246,0.25), transparent),
      radial-gradient(600px 500px at 80% 70%, rgba(236,72,153,0.18), transparent),
      #0a0a14;
  }
  .phone {
    width: 420px;
    height: 92vh;
    max-height: 880px;
    background: #000;
    border-radius: 48px;
    border: 10px solid #1f1f2e;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    overflow: hidden;
    position: relative;
  }
  .notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: #000; border-radius: 20px; z-index: 30;
  }
  .feed {
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  .feed::-webkit-scrollbar { display: none; }
  .card {
    height: 100%;
    scroll-snap-align: start;
    position: relative;
    overflow: hidden;
  }
  .card-bg {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .grad-1 { background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f97316 100%); }
  .grad-2 { background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%); }
  .grad-3 { background: linear-gradient(135deg, #10b981 0%, #06b6d4 50%, #3b82f6 100%); }
  .grad-4 { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 50%, #ec4899 100%); }
  .grad-5 { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%); }
  .grad-6 { background: linear-gradient(135deg, #ec4899 0%, #f97316 50%, #eab308 100%); }
  .grad-7 { background: linear-gradient(135deg, #14b8a6 0%, #22c55e 50%, #eab308 100%); }
  .grad-8 { background: linear-gradient(135deg, #f43f5e 0%, #8b5cf6 50%, #3b82f6 100%); }
  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 30%, transparent 55%, rgba(0,0,0,0.75) 100%);
  }
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 50px; z-index: 20;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 26px 6px;
    font-size: 13px; font-weight: 600;
  }
  .top-tabs {
    position: absolute; top: 60px; left: 0; right: 0; z-index: 20;
    display: flex; justify-content: center; gap: 20px;
    font-size: 15px;
  }
  .top-tabs .tab { opacity: 0.5; }
  .top-tabs .tab.active { opacity: 1; font-weight: 700; border-bottom: 2px solid white; padding-bottom: 4px; }
  .side-actions {
    position: absolute; right: 14px; bottom: 160px; z-index: 20;
    display: flex; flex-direction: column; gap: 20px; align-items: center;
  }
  .side-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .side-count { font-size: 11px; margin-top: 4px; }
  .play-icon {
    font-size: 80px; opacity: 0.3;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.05)} }
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 20px 16px 30px;
  }
  .info-area { padding-right: 80px; margin-bottom: 16px; }
  .nav-bar {
    display: flex; justify-content: space-around;
    padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .nav-item { font-size: 11px; opacity: 0.5; text-align: center; }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
  .sidepanel { color: #e5e7eb; max-width: 300px; padding: 20px; }
  .sidepanel h3 { color: white; font-weight: 700; margin-bottom: 10px; }
  .sidepanel p { font-size: 13px; line-height: 1.7; opacity: 0.8; }
</style>
</head>
<body>

<div class="app-shell">
  <!-- Left side commentary -->
  <div class="sidepanel">
    <div class="inline-block px-3 py-1 bg-purple-600/30 border border-purple-500/40 rounded-full text-xs text-purple-300 mb-4">DEMO 2 · 师缘</div>
    <h3 class="serif text-2xl">短视频式<br/>老师发现</h3>
    <p class="mt-4">每位老师一条15秒自我介绍视频。家长像刷抖音一样刷老师，上下滑动浏览，双击点赞，找到对眼的老师直接联系。</p>
    <div class="mt-6 space-y-3 text-xs">
      <div class="flex gap-2"><span class="text-pink-400">●</span><span>适合年轻家长 (80/90后)</span></div>
      <div class="flex gap-2"><span class="text-purple-400">●</span><span>老师通过人设获客，而非广告</span></div>
      <div class="flex gap-2"><span class="text-cyan-400">●</span><span>内容可分享，获客成本极低</span></div>
    </div>
  </div>

  <!-- Phone mockup -->
  <div class="phone">
    <div class="notch"></div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- Right side commentary -->
  <div class="sidepanel">
    <h3 class="serif text-2xl text-right">👆 上下滑动<br/>换下一位</h3>
    <p class="mt-4 text-right">这是老师端口最好的流量引擎：老师发得越多、内容越好，曝光越多。平台激励老师自产内容，内容反哺流量。</p>
    <div class="mt-6 p-4 bg-white/5 border border-white/10 rounded-xl">
      <div class="text-xs text-pink-300 mb-2">核心差异化</div>
      <p class="text-xs text-gray-300 leading-relaxed">掌门、轻轻都是"货架式"电商UI — 我们是"内容社区"UI。老师有粉丝、有品牌，留在平台的动力更强。</p>
    </div>
  </div>
</div>

<script>
const TUTORS = [
  { name:"李明", subject:"初高中数学", gradeKey:"grad-1", quote:"我不讲题，我讲为什么会这样想。", emoji:"📐", tags:["#云师大研究生","#中考冲刺","#昆明五华区"], likes:"2.3w", comments:"412", shares:"186", price:180, years:5 },
  { name:"王芳", subject:"小初英语", gradeKey:"grad-2", quote:"让孩子从'哑巴英语'变成敢开口。", emoji:"🗣️", tags:["#云大英语","#雅思8.0","#沉浸式口语"], likes:"1.8w", comments:"367", shares:"254", price:150, years:3 },
  { name:"杨帆", subject:"少儿编程", gradeKey:"grad-3", quote:"代码是工具，创造力才是目的。", emoji:"💻", tags:["#华为前端","#信奥赛","#Python"], likes:"3.1w", comments:"589", shares:"421", price:200, years:4 },
  { name:"陈刚", subject:"钢琴 · 古典", gradeKey:"grad-4", quote:"练琴不是受苦，是和音乐对话。", emoji:"🎹", tags:["#央院硕士","#考级","#大师课"], likes:"1.2w", comments:"198", shares:"92", price:300, years:6 },
  { name:"赵娟", subject:"小学语文", gradeKey:"grad-5", quote:"阅读是孩子一生的底气。", emoji:"📖", tags:["#一级教师","#作文专项","#10年经验"], likes:"4.5w", comments:"823", shares:"617", price:160, years:10 },
  { name:"张伟", subject:"高中物理", gradeKey:"grad-6", quote:"物理难，是因为没找到'感觉'。", emoji:"⚡", tags:["#昆工硕士","#高考专项","#呈贡"], likes:"2.7w", comments:"445", shares:"231", price:220, years:8 },
  { name:"孙悦", subject:"儿童美术", gradeKey:"grad-7", quote:"不教孩子画，教孩子看。", emoji:"🎨", tags:["#云艺","#国画","#启蒙"], likes:"1.5w", comments:"278", shares:"143", price:130, years:3 },
  { name:"刘静", subject:"书法", gradeKey:"grad-8", quote:"写字如做人，一笔一画见修养。", emoji:"🖌️", tags:["#省书协","#12年经验","#素质教育"], likes:"9821", comments:"156", shares:"88", price:120, years:12 }
];

const feed = document.getElementById('feed');
TUTORS.forEach((t, i) => {
  const active = i === 0;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-bg ${t.gradeKey}">
      <div class="play-icon">${t.emoji}</div>
    </div>
    <div class="card-overlay"></div>

    <!-- status bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span>••• 📶 🔋</span>
    </div>

    <!-- top tabs -->
    <div class="top-tabs">
      <div class="tab">关注</div>
      <div class="tab active">推荐</div>
      <div class="tab">附近</div>
      <div class="tab">🔍</div>
    </div>

    <!-- side actions -->
    <div class="side-actions">
      <div class="text-center">
        <div class="side-btn">👤</div>
        <div class="side-count">关注</div>
      </div>
      <div class="text-center">
        <div class="side-btn text-red-400">❤️</div>
        <div class="side-count">${t.likes}</div>
      </div>
      <div class="text-center">
        <div class="side-btn">💬</div>
        <div class="side-count">${t.comments}</div>
      </div>
      <div class="text-center">
        <div class="side-btn">📤</div>
        <div class="side-count">${t.shares}</div>
      </div>
      <div class="text-center">
        <div class="side-btn">⭐</div>
        <div class="side-count">收藏</div>
      </div>
    </div>

    <!-- bottom info + nav -->
    <div class="bottom-bar">
      <div class="info-area">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-10 h-10 rounded-full bg-white/20 border-2 border-white flex items-center justify-center font-bold">${t.name[0]}</div>
          <div class="font-bold text-lg">@${t.name}老师</div>
          <button class="ml-1 px-3 py-0.5 border border-white rounded-full text-xs font-bold">+ 关注</button>
        </div>
        <div class="text-sm font-semibold mb-1">${t.subject} · ${t.years}年经验</div>
        <div class="text-sm mb-2 leading-relaxed">「${t.quote}」</div>
        <div class="text-xs opacity-80 mb-3">${t.tags.join(' ')}</div>
        <div class="flex items-center gap-2">
          <div class="bg-white text-black font-bold px-4 py-2 rounded-full text-sm">💬 联系 · ¥${t.price}/课时</div>
          <div class="text-[10px] opacity-70">老师定价 · 0抽成</div>
        </div>
      </div>

      <div class="nav-bar">
        <div class="nav-item active"><span class="nav-icon">🏠</span>首页</div>
        <div class="nav-item"><span class="nav-icon">🔍</span>发现</div>
        <div class="nav-item"><span class="nav-icon">➕</span></div>
        <div class="nav-item"><span class="nav-icon">💬</span>消息</div>
        <div class="nav-item"><span class="nav-icon">👤</span>我的</div>
      </div>
    </div>
  `;
  feed.appendChild(card);
});
</script>
</body>
</html>
