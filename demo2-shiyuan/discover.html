<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>发现 · 师缘</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0a0a14;
    color: white;
    margin: 0; overflow: hidden;
  }
  .serif { font-family: "Noto Serif SC", serif; }
  .app-shell {
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 420px 1fr;
    align-items: center;
    justify-items: center;
    background:
      radial-gradient(800px 600px at 20% 30%, rgba(139,92,246,0.25), transparent),
      radial-gradient(600px 500px at 80% 70%, rgba(236,72,153,0.18), transparent),
      #0a0a14;
  }
  .phone {
    width: 420px; height: 92vh; max-height: 880px;
    background: #0a0a14; border-radius: 48px;
    border: 10px solid #1f1f2e;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    overflow: hidden; position: relative;
  }
  .notch { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 20px; z-index: 30; }
  .scroll { height: 100%; overflow-y: auto; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 0 26px; background: #0a0a14;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; justify-content: space-around;
    z-index: 20;
  }
  .nav-item { text-align: center; color: #9ca3af; font-size: 10px; }
  .nav-item.active { color: white; }
  .nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
  .tag-pill { background: rgba(255,255,255,0.1); padding: 5px 14px; border-radius: 999px; font-size: 12px; cursor: pointer; }
  .tag-pill.active { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
  .card-bg { aspect-ratio: 9/14; border-radius: 10px; position: relative; overflow: hidden; cursor: pointer; }
  .card-bg:hover { transform: translateY(-2px); }
  .grad-1 { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
  .grad-2 { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
  .grad-3 { background: linear-gradient(135deg, #10b981, #06b6d4); }
  .grad-4 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  .grad-5 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .grad-6 { background: linear-gradient(135deg, #ec4899, #f97316); }
  .grad-7 { background: linear-gradient(135deg, #14b8a6, #22c55e); }
  .grad-8 { background: linear-gradient(135deg, #f43f5e, #8b5cf6); }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.75) 100%);
    padding: 8px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .sidepanel { color: #e5e7eb; max-width: 300px; padding: 20px; }
  .sidepanel h3 { color: white; font-weight: 700; margin-bottom: 10px; }
  .sidepanel p { font-size: 13px; line-height: 1.7; opacity: 0.8; }
</style>
</head>
<body>

<div class="app-shell">
  <div class="sidepanel">
    <div class="inline-block px-3 py-1 bg-purple-600/30 border border-purple-500/40 rounded-full text-xs text-purple-300 mb-4">发现页</div>
    <h3 class="serif text-2xl">分类浏览 +<br/>内容发现</h3>
    <p class="mt-4">首页是"个性化推荐"，发现页是"主动搜索"。家长按学科、年级、地区精准筛选老师。</p>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="scroll" style="padding-bottom: 80px;">

      <!-- Header -->
      <div class="pt-16 px-4 pb-4 sticky top-0 bg-[#0a0a14] z-10">
        <div class="flex items-center gap-2 mb-4">
          <input type="text" placeholder="🔍 搜索老师、学科..." class="flex-1 bg-white/10 border border-white/10 rounded-full px-4 py-2 text-sm" />
          <div class="w-9 h-9 bg-white/10 rounded-full flex items-center justify-center">📍</div>
        </div>
        <div class="flex gap-2 overflow-x-auto pb-2" style="scrollbar-width: none;">
          <span class="tag-pill active whitespace-nowrap">全部</span>
          <span class="tag-pill whitespace-nowrap">小学</span>
          <span class="tag-pill whitespace-nowrap">初中</span>
          <span class="tag-pill whitespace-nowrap">高中</span>
          <span class="tag-pill whitespace-nowrap">艺术</span>
          <span class="tag-pill whitespace-nowrap">编程</span>
        </div>
      </div>

      <!-- Hot banner -->
      <div class="px-4 mb-5">
        <div class="bg-gradient-to-r from-pink-600 to-purple-600 rounded-2xl p-4 flex items-center gap-3">
          <div class="text-3xl">🔥</div>
          <div class="flex-1">
            <div class="font-bold text-sm">本周云南人气老师</div>
            <div class="text-xs opacity-80">播放量突破 50 万的老师</div>
          </div>
          <div class="text-sm">→</div>
        </div>
      </div>

      <!-- Categories -->
      <div class="px-4 mb-5">
        <h3 class="text-sm font-bold mb-3">学科分类</h3>
        <div class="grid grid-cols-4 gap-3 text-xs text-center">
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-orange-500 to-red-500 mx-auto flex items-center justify-center text-2xl">📐</div>
            <div class="mt-2">数学</div>
          </div>
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-600 mx-auto flex items-center justify-center text-2xl">📖</div>
            <div class="mt-2">语文</div>
          </div>
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 mx-auto flex items-center justify-center text-2xl">🗣️</div>
            <div class="mt-2">英语</div>
          </div>
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-purple-500 to-pink-500 mx-auto flex items-center justify-center text-2xl">⚡</div>
            <div class="mt-2">物理</div>
          </div>
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-pink-500 to-rose-600 mx-auto flex items-center justify-center text-2xl">🧪</div>
            <div class="mt-2">化学</div>
          </div>
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-yellow-500 to-orange-500 mx-auto flex items-center justify-center text-2xl">🎹</div>
            <div class="mt-2">钢琴</div>
          </div>
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-teal-500 to-green-600 mx-auto flex items-center justify-center text-2xl">💻</div>
            <div class="mt-2">编程</div>
          </div>
          <div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-600 to-stone-700 mx-auto flex items-center justify-center text-2xl">🖌️</div>
            <div class="mt-2">书法</div>
          </div>
        </div>
      </div>

      <!-- Trending tutors grid -->
      <div class="px-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="text-sm font-bold">热门老师</h3>
          <span class="text-xs text-gray-400">排行榜 →</span>
        </div>
        <div id="tutorGrid" class="grid grid-cols-2 gap-2"></div>
      </div>

    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <a href="index.html" class="nav-item"><span class="icon">🏠</span>首页</a>
      <a href="discover.html" class="nav-item active"><span class="icon">🔍</span>发现</a>
      <a href="upload.html" class="nav-item"><span class="icon">➕</span></a>
      <a href="messages.html" class="nav-item"><span class="icon">💬</span>消息</a>
      <a href="profile.html" class="nav-item"><span class="icon">👤</span>我的</a>
    </div>
  </div>

  <div class="sidepanel">
    <h3 class="serif text-2xl text-right">👆 像抖音一样<br/>浏览老师</h3>
    <p class="mt-4 text-right">分类入口 + 热度排行 + 搜索，让供给端被系统地展示给需求端。</p>
  </div>
</div>

<script>
const TUTORS = [
  { name:"李明", subj:"初高中数学", gradeKey:"grad-1", plays:"58.2w", emoji:"📐" },
  { name:"王芳", subj:"小初英语", gradeKey:"grad-2", plays:"42.1w", emoji:"🗣️" },
  { name:"杨帆", subj:"少儿编程", gradeKey:"grad-3", plays:"37.8w", emoji:"💻" },
  { name:"陈刚", subj:"钢琴", gradeKey:"grad-4", plays:"28.4w", emoji:"🎹" },
  { name:"赵娟", subj:"小学语文", gradeKey:"grad-5", plays:"52.7w", emoji:"📖" },
  { name:"张伟", subj:"高中物理", gradeKey:"grad-6", plays:"31.9w", emoji:"⚡" },
  { name:"孙悦", subj:"儿童美术", gradeKey:"grad-7", plays:"18.3w", emoji:"🎨" },
  { name:"刘静", subj:"书法", gradeKey:"grad-8", plays:"12.5w", emoji:"🖌️" },
  { name:"黄涛", subj:"高中化学", gradeKey:"grad-2", plays:"22.1w", emoji:"🧪" },
  { name:"周丽", subj:"初中英语", gradeKey:"grad-4", plays:"19.8w", emoji:"🌸" },
  { name:"吴浩", subj:"初中数学", gradeKey:"grad-5", plays:"26.3w", emoji:"➗" },
  { name:"林颖", subj:"幼儿英语", gradeKey:"grad-7", plays:"14.7w", emoji:"🎈" }
];

const grid = document.getElementById('tutorGrid');
TUTORS.forEach(t => {
  const a = document.createElement('a');
  a.href = 'tutor-profile.html';
  a.className = `card-bg ${t.gradeKey} block`;
  a.innerHTML = `
    <div class="overlay">
      <div class="flex items-center justify-between">
        <div class="text-3xl">${t.emoji}</div>
        <div class="bg-black/40 rounded-full px-2 py-0.5 text-[10px]">▶ ${t.plays}</div>
      </div>
      <div>
        <div class="flex items-center gap-1.5 mb-1">
          <div class="w-5 h-5 rounded-full bg-white/30 flex items-center justify-center text-[10px] font-bold">${t.name[0]}</div>
          <div class="text-xs font-bold">${t.name}老师</div>
        </div>
        <div class="text-[10px] opacity-80">${t.subj}</div>
      </div>
    </div>
  `;
  grid.appendChild(a);
});
</script>
</body>
</html>
