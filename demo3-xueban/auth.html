<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>登录 / 注册 · 学伴</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; margin: 0; }
  .serif { font-family: "Noto Serif SC", serif; }
  .brand-green { color: #1a5d3a; }
  .bg-brand-green { background-color: #1a5d3a; }
  .brand-orange { color: #D97706; }
  .bg-brand-orange { background-color: #D97706; }
  .hero-bg {
    background:
      radial-gradient(1000px 600px at 20% 30%, rgba(26,93,58,0.08), transparent),
      radial-gradient(800px 500px at 80% 70%, rgba(217,119,6,0.08), transparent),
      #FDF9F0;
  }
  .role-btn { cursor: pointer; transition: all .2s; border: 2px solid transparent; }
  .role-btn.active { border-color: #1a5d3a; background: #F0FDF4; }
  .role-btn.active .role-title { color: #1a5d3a; }
  .tab { cursor: pointer; padding: 10px 0; border-bottom: 2px solid transparent; }
  .tab.active { border-color: #1a5d3a; color: #1a5d3a; font-weight: 700; }
</style>
</head>
<body class="hero-bg flex items-center justify-center p-6 text-gray-800">

<div class="w-full max-w-5xl grid md:grid-cols-2 bg-white rounded-3xl shadow-2xl overflow-hidden border border-amber-100">

  <!-- Left: brand panel -->
  <div class="bg-gradient-to-br from-green-800 via-green-700 to-emerald-900 text-white p-12 flex flex-col justify-between relative overflow-hidden">
    <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -translate-y-20 translate-x-20"></div>
    <div class="absolute bottom-0 left-0 w-80 h-80 bg-amber-400/10 rounded-full translate-y-20 -translate-x-20"></div>

    <a href="index.html" class="flex items-center gap-2 relative">
      <div class="w-10 h-10 rounded-lg bg-white text-green-800 flex items-center justify-center font-bold serif text-xl">学</div>
      <div>
        <div class="font-bold serif text-lg">学伴</div>
        <div class="text-[10px] opacity-70">XUEBAN · 每本书都有一位好老师</div>
      </div>
    </a>

    <div class="relative">
      <h1 class="serif text-4xl font-bold mb-4 leading-tight">
        扫一本书，<br/>遇见一位老师
      </h1>
      <p class="opacity-80 mb-8 leading-relaxed text-sm">
        120+ 款滇版教材接入 · 2,400+ 认证老师<br/>
        0 平台抽成 · 您支付的每一分都归老师
      </p>
      <div class="grid grid-cols-3 gap-4 text-center">
        <div>
          <div class="serif text-3xl font-bold">0%</div>
          <div class="text-xs opacity-70">平台抽成</div>
        </div>
        <div>
          <div class="serif text-3xl font-bold">2,400+</div>
          <div class="text-xs opacity-70">认证老师</div>
        </div>
        <div>
          <div class="serif text-3xl font-bold">4.9</div>
          <div class="text-xs opacity-70">平均评分</div>
        </div>
      </div>
    </div>

    <div class="text-xs opacity-60 relative bg-white/5 rounded-xl p-4">
      💬 "扫了小明的数学书，系统直接推荐了教过这本教材的赵老师。一个月下来，孩子数学从78分提到了92分。"
      <div class="mt-1 opacity-80 text-right">— 昆明 · 王妈妈</div>
    </div>
  </div>

  <!-- Right: form -->
  <div class="p-12 flex flex-col">
    <div class="flex justify-end text-xs text-gray-500 mb-6">
      <a href="index.html" class="hover:brand-green">← 返回首页</a>
    </div>

    <!-- Tabs -->
    <div class="flex gap-8 border-b mb-6">
      <div class="tab active" data-tab="login">登录</div>
      <div class="tab" data-tab="signup">注册账户</div>
    </div>

    <h2 class="serif text-2xl font-bold mb-2">欢迎来到学伴</h2>
    <p class="text-sm text-gray-500 mb-6">选择您的角色开始</p>

    <!-- Role selector -->
    <div class="grid grid-cols-2 gap-3 mb-6">
      <div class="role-btn active rounded-xl p-4">
        <div class="text-2xl mb-2">👨‍👩‍👧</div>
        <div class="role-title font-bold text-sm">我是家长</div>
        <div class="text-xs text-gray-500 mt-1">为孩子找老师</div>
      </div>
      <div class="role-btn rounded-xl p-4" onclick="window.location='onboard.html';">
        <div class="text-2xl mb-2">🎓</div>
        <div class="role-title font-bold text-sm">我是老师</div>
        <div class="text-xs text-gray-500 mt-1">入驻 · 0 抽成</div>
      </div>
    </div>

    <form class="space-y-4 flex-1" onsubmit="event.preventDefault(); window.location='dashboard.html';">
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">手机号</label>
        <div class="flex gap-2">
          <select class="px-3 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50">
            <option>🇨🇳 +86</option>
          </select>
          <input type="tel" required placeholder="请输入手机号" value="138 0888 0000" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm" />
        </div>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">验证码</label>
        <div class="flex gap-2">
          <input type="text" required placeholder="6位短信验证码" value="••••••" class="flex-1 px-4 py-2.5 border border-gray-200 rounded-lg text-sm" />
          <button type="button" class="px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 whitespace-nowrap hover:bg-gray-50">发送验证码</button>
        </div>
      </div>
      <div class="flex items-center justify-between text-xs">
        <label class="flex items-center gap-2 text-gray-600">
          <input type="checkbox" checked class="accent-green-700"/>
          <span>同意 <a href="#" class="brand-green">《服务协议》</a> 与 <a href="#" class="brand-green">《隐私政策》</a></span>
        </label>
      </div>
      <button type="submit" class="w-full bg-brand-green text-white py-3 rounded-lg font-semibold text-sm">登录 / 注册</button>
    </form>

    <div class="my-5 flex items-center gap-3">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400">其他登录方式</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <div class="grid grid-cols-3 gap-3">
      <button class="border border-gray-200 py-2.5 rounded-lg text-xs flex items-center justify-center gap-1 hover:bg-gray-50">
        <span class="text-green-600">●</span> 微信
      </button>
      <button class="border border-gray-200 py-2.5 rounded-lg text-xs flex items-center justify-center gap-1 hover:bg-gray-50">
        <span class="text-red-500">●</span> QQ
      </button>
      <button class="border border-gray-200 py-2.5 rounded-lg text-xs flex items-center justify-center gap-1 hover:bg-gray-50">
        <span class="text-blue-500">●</span> 支付宝
      </button>
    </div>

    <div class="text-[11px] text-gray-500 text-center mt-5">
      学伴承诺：您的数据仅用于精准匹配老师，绝不用于广告投放
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.role-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.role-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  });
});
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});
</script>
</body>
</html>
