<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>老师详情 · 学伴</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #FDF9F0; color: #1f2937; }
  .serif { font-family: "Noto Serif SC", serif; }
  .brand-green { color: #1a5d3a; }
  .bg-brand-green { background-color: #1a5d3a; }
  .brand-orange { color: #D97706; }
  .bg-brand-orange { background-color: #D97706; }
  .fav-btn { cursor: pointer; transition: transform .15s; }
  .fav-btn:hover { transform: scale(1.2); }
</style>
</head>
<body>

<nav class="border-b border-amber-100 bg-white sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-10 h-10 rounded-lg bg-brand-green text-white flex items-center justify-center font-bold serif text-xl">学</div>
      <div class="serif font-bold text-lg brand-green">学伴</div>
    </a>
    <div class="hidden md:flex gap-6 text-sm">
      <a href="tutors.html" class="text-gray-700">找老师</a>
      <a href="books.html" class="text-gray-700">教材库</a>
      <a href="dashboard.html" class="text-gray-700">我的学伴</a>
      <a href="messages.html" class="text-gray-700">消息</a>
    </div>
    <div class="w-9 h-9 rounded-full bg-amber-500 text-white flex items-center justify-center font-bold">王</div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8">

  <div class="text-xs text-gray-500 mb-4">
    <a href="index.html" class="hover:brand-green">首页</a> /
    <a href="tutors.html" class="hover:brand-green">找老师</a> /
    <span id="crumb" class="text-gray-700">...</span>
  </div>

  <div id="profile" class="grid lg:grid-cols-[1fr_320px] gap-6"></div>

  <!-- Related tutors -->
  <div class="mt-10">
    <h2 class="serif text-xl font-bold mb-5">🔗 您可能也喜欢</h2>
    <div id="relatedTutors" class="grid md:grid-cols-4 gap-4"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
  // Read ?id= from URL
  const id = parseInt(new URLSearchParams(location.search).get('id') || '1');
  const t = getTutorById(id) || TUTORS[0];
  const reviews = getReviewsForTutor(t.id);
  const isFav = isFavorited(t.id);

  // Update page metadata
  document.title = `${t.name}老师 · 学伴`;
  document.getElementById('crumb').textContent = `${t.name} 老师`;

  // Star distribution for reviews
  const starDist = [5, 4, 3, 2, 1].map(n => ({
    stars: n,
    count: reviews.filter(r => r.rating === n).length
  }));

  const reviewHtml = reviews.length
    ? reviews.map(r => `
        <div class="py-4 border-b last:border-0">
          <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-bold text-gray-600">${r.parent[0]}</div>
              <div class="font-semibold text-sm">${r.parent}</div>
            </div>
            <div class="text-xs text-gray-400">${r.date}</div>
          </div>
          <div class="text-yellow-500 text-xs mb-2">${'⭐'.repeat(r.rating)}</div>
          <div class="text-sm text-gray-600 leading-relaxed">${r.text}</div>
        </div>
      `).join('')
    : `<div class="py-6 text-sm text-gray-400 text-center">暂无评价</div>`;

  document.getElementById('profile').innerHTML = `
    <div class="space-y-5">
      <!-- Header -->
      <div class="bg-white rounded-2xl p-6 border border-amber-100">
        <div class="flex items-start gap-5">
          <div class="w-28 h-28 flex-shrink-0 rounded-3xl flex items-center justify-center font-bold text-white text-5xl serif" style="background:${t.color}">${t.name[0]}</div>
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <h1 class="serif text-3xl font-bold">${t.name} 老师</h1>
              ${t.featured ? '<span class="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold">⭐ 学伴推荐</span>' : ''}
              <button class="fav-btn text-2xl ml-auto" id="favBtn" onclick="toggleFav()" title="${isFav ? '取消收藏' : '收藏'}">${isFav ? '❤️' : '🤍'}</button>
            </div>
            <div class="text-sm text-gray-600 mb-2">${t.school} · ${t.title}</div>
            <div class="flex flex-wrap gap-2 text-xs mb-3">
              <span class="text-yellow-600 font-bold">⭐ ${t.rating}</span>
              <span class="text-gray-500">(${t.reviews} 条评价)</span>
              <span class="text-gray-500">·</span>
              <span class="text-gray-600">教龄 ${t.years} 年</span>
              <span class="text-gray-500">·</span>
              <span class="text-gray-600">已教 ${t.students}+ 学生</span>
              <span class="text-gray-500">·</span>
              <span class="text-gray-600">📍 ${t.city} ${t.district}</span>
            </div>
            <div class="flex flex-wrap gap-1">
              ${t.tags.map(tag => `<span class="text-xs px-2 py-1 bg-green-50 text-green-800 rounded">${tag}</span>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <!-- Bio -->
      <div class="bg-white rounded-2xl p-6 border border-amber-100">
        <h2 class="serif text-lg font-bold mb-3">老师简介</h2>
        <p class="text-sm text-gray-700 leading-relaxed mb-4">${t.bio}</p>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
          <div class="bg-gray-50 rounded-lg p-3">
            <div class="text-xs text-gray-500 mb-1">教学风格</div>
            <div class="font-semibold text-sm">${t.style}</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <div class="text-xs text-gray-500 mb-1">适合年级</div>
            <div class="font-semibold text-sm">${t.grades.join(' · ')}</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <div class="text-xs text-gray-500 mb-1">授课方式</div>
            <div class="font-semibold text-sm">${t.mode.join(' / ')}</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <div class="text-xs text-gray-500 mb-1">主授科目</div>
            <div class="font-semibold text-sm">${t.subjects.join(' · ')}</div>
          </div>
        </div>
      </div>

      ${t.books.length > 0 ? `
        <!-- Book experience -->
        <div class="bg-white rounded-2xl p-6 border border-amber-100">
          <h2 class="serif text-lg font-bold mb-3">📘 教过的教材（${t.books.length}）</h2>
          <p class="text-xs text-gray-500 mb-4">家长扫描这些课本时，${t.name}老师会优先匹配给您</p>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
            ${t.books.map(b => `<span class="text-xs px-3 py-2 bg-amber-50 border border-amber-200 rounded-lg">📖 ${b}</span>`).join('')}
          </div>
        </div>
      ` : ''}

      <!-- Credentials -->
      <div class="bg-white rounded-2xl p-6 border border-amber-100">
        <h2 class="serif text-lg font-bold mb-3">资质证书</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
          ${t.verified.map(v => `
            <div class="flex items-center gap-2 p-3 border border-green-100 bg-green-50 rounded-lg">
              <span class="text-green-600">✓</span>
              <span class="text-sm text-green-800">${v}</span>
            </div>
          `).join('')}
        </div>
        <p class="text-xs text-gray-500 mt-4">所有资质均经学伴人工核验。通过率仅 68%，确保老师真实可靠。</p>
      </div>

      <!-- Rating breakdown + Reviews -->
      <div class="bg-white rounded-2xl p-6 border border-amber-100">
        <h2 class="serif text-lg font-bold mb-4">家长评价 (${t.reviews})</h2>
        <!-- Overall -->
        <div class="flex items-center gap-6 p-4 bg-amber-50 rounded-xl mb-5">
          <div class="text-center">
            <div class="serif text-5xl font-bold text-yellow-600">${t.rating}</div>
            <div class="text-xs text-gray-500 mt-1">综合评分</div>
          </div>
          <div class="flex-1">
            ${starDist.map(d => `
              <div class="flex items-center gap-2 text-xs mb-1">
                <span class="w-8">${d.stars} ⭐</span>
                <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                  <div class="h-full bg-yellow-400" style="width:${reviews.length ? (d.count/reviews.length*100) : 0}%"></div>
                </div>
                <span class="w-6 text-gray-500 text-right">${d.count}</span>
              </div>
            `).join('')}
          </div>
        </div>
        ${reviewHtml}
      </div>
    </div>

    <!-- Sticky CTA -->
    <aside class="lg:sticky lg:top-24 h-fit space-y-4">
      <div class="bg-white rounded-2xl p-6 border border-amber-100 shadow-sm">
        <div class="text-center mb-4">
          <div class="text-4xl font-bold serif">¥${t.price}<span class="text-base text-gray-400 font-normal">/课时</span></div>
          <div class="text-xs text-gray-500 mt-1">老师自主定价 · 平台 0 抽成</div>
        </div>
        <div class="space-y-2 mb-5 text-xs text-gray-600">
          <div class="flex items-center gap-2"><span class="brand-green">✓</span> 首课可试听 30 分钟</div>
          <div class="flex items-center gap-2"><span class="brand-green">✓</span> 家长与老师直接沟通</div>
          <div class="flex items-center gap-2"><span class="brand-green">✓</span> 不满意随时终止</div>
          <div class="flex items-center gap-2"><span class="brand-green">✓</span> 收入 100% 归老师</div>
        </div>
        <a href="booking.html?id=${t.id}" class="block text-center bg-brand-green text-white py-3 rounded-lg font-semibold text-sm mb-2">📅 预约首课试听</a>
        <a href="messages.html?id=${t.id}" class="block text-center bg-brand-orange text-white py-3 rounded-lg font-semibold text-sm mb-2">💬 直接联系老师</a>
        <button onclick="toggleFav()" id="favBtn2" class="w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold text-sm">${isFav ? '❤️ 已收藏' : '🤍 收藏老师'}</button>
      </div>

      <div class="bg-red-50 border border-red-100 rounded-2xl p-5">
        <div class="text-xs text-[#C8102E] font-semibold mb-2">📢 为什么我们不抽成？</div>
        <p class="text-xs text-gray-700 leading-relaxed">
          老师的劳动成果应全部归老师。我们通过付费会员和出版社合作盈利，不从课时费中抽取一分钱。
        </p>
        <a href="pricing.html" class="text-xs brand-green mt-2 inline-block hover:underline">了解我们的商业模式 →</a>
      </div>

      <!-- Compliance -->
      <div class="bg-green-50 border border-green-100 rounded-2xl p-5">
        <div class="text-xs text-green-800 font-semibold mb-2">🛡️ 合规保障</div>
        <ul class="text-xs text-gray-700 space-y-1">
          <li>• 学伴严格遵守《双减》政策</li>
          <li>• 义务教育学科类培训有时段限制</li>
          <li>• 所有素质教育类不受限制</li>
        </ul>
        <a href="compliance.html" class="text-xs brand-green mt-2 inline-block hover:underline">查看合规披露 →</a>
      </div>
    </aside>
  `;

  // Related tutors (same subject category, excluding self)
  const related = TUTORS
    .filter(r => r.id !== t.id && (r.category === t.category || r.subjects.some(s => t.subjects.includes(s))))
    .sort((a,b) => b.rating - a.rating)
    .slice(0, 4);
  const relatedEl = document.getElementById('relatedTutors');
  related.forEach(r => {
    const a = document.createElement('a');
    a.href = `tutor.html?id=${r.id}`;
    a.className = 'bg-white rounded-2xl border border-amber-100 p-4 hover:shadow-lg transition';
    a.innerHTML = `
      <div class="flex items-center gap-3 mb-3">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-white serif" style="background:${r.color}">${r.name[0]}</div>
        <div>
          <div class="font-bold text-sm">${r.name} 老师</div>
          <div class="text-xs text-gray-500">${r.subjects.join('·')} · ⭐ ${r.rating}</div>
        </div>
      </div>
      <div class="flex justify-between items-end text-xs pt-2 border-t">
        <span class="text-gray-500">${r.district}</span>
        <span class="serif font-bold">¥${r.price}</span>
      </div>
    `;
    relatedEl.appendChild(a);
  });

  function toggleFav() {
    const nowFav = toggleFavorite(t.id);
    const icon = nowFav ? '❤️' : '🤍';
    const btn1 = document.getElementById('favBtn');
    const btn2 = document.getElementById('favBtn2');
    if (btn1) btn1.textContent = icon;
    if (btn2) btn2.textContent = nowFav ? '❤️ 已收藏' : '🤍 收藏老师';
  }
</script>
</body>
</html>
