<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>匹配结果 — 学伴</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #FDF9F0; color: #1f2937; }
  .serif { font-family: "Noto Serif SC", "STSong", serif; }
  .brand-green { color: #1a5d3a; }
  .bg-brand-green { background-color: #1a5d3a; }
  .brand-orange { color: #D97706; }
  .bg-brand-orange { background-color: #D97706; }

  .stamp {
    display: inline-block;
    border: 2px solid #D97706;
    color: #D97706;
    padding: 2px 10px;
    font-family: "Noto Serif SC", serif;
    font-weight: 700;
    letter-spacing: 2px;
    transform: rotate(-3deg);
    font-size: 11px;
  }
  .match-bar {
    height: 6px; border-radius: 3px; background: #e5e7eb; overflow: hidden;
  }
  .match-bar > div { height: 100%; background: linear-gradient(90deg, #16a34a, #D97706); }
</style>
</head>
<body>

<nav class="border-b border-amber-100/50 bg-[#FDF9F0]/80 backdrop-blur sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-10 h-10 rounded-lg bg-brand-green text-white flex items-center justify-center font-bold serif text-xl">学</div>
      <div class="serif font-bold text-lg brand-green">学伴</div>
    </a>
    <a href="index.html" class="text-sm text-gray-600">← 返回首页</a>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8">

  <!-- Matched book context -->
  <div class="bg-white rounded-2xl p-6 border border-amber-100 mb-6 flex items-center gap-5">
    <div class="w-20 h-28 rounded bg-gradient-to-br from-amber-500 to-orange-700 flex-shrink-0 flex flex-col justify-between p-2 text-white">
      <div class="text-[9px] opacity-80">人教版</div>
      <div class="serif text-sm font-bold leading-tight">小学数学<br/>五年级上</div>
    </div>
    <div class="flex-1">
      <div class="flex items-center gap-2 mb-1">
        <span class="stamp">已识别</span>
        <span class="text-xs text-gray-500">扫描时间 16:32</span>
      </div>
      <h1 class="serif text-2xl font-bold">人教版 · 小学数学 · 五年级上册</h1>
      <div class="text-sm text-gray-600 mt-1">ISBN 978-7-107-xxxxxx · 云南出版集团发行</div>
      <div class="flex gap-4 mt-3 text-xs">
        <span class="bg-amber-50 text-amber-800 px-2 py-1 rounded">📍 昆明 五华区</span>
        <span class="bg-green-50 text-green-800 px-2 py-1 rounded">🎁 已激活 1个月免费会员</span>
        <span class="bg-red-50 text-red-700 px-2 py-1 rounded">⚡ 首课30分钟免费试听</span>
      </div>
    </div>
    <a href="index.html" class="text-xs brand-orange underline">重新扫描</a>
  </div>

  <!-- Results header -->
  <div class="flex items-end justify-between mb-5">
    <div>
      <h2 class="serif text-xl font-bold">为您精选的 <span class="brand-green">5</span> 位老师</h2>
      <p class="text-sm text-gray-500 mt-1">按教材匹配度 + 距离 + 评分排序，0平台抽成</p>
    </div>
    <select class="text-sm border border-amber-200 rounded-lg px-3 py-2 bg-white">
      <option>综合推荐</option>
      <option>距离最近</option>
      <option>好评最高</option>
      <option>价格由低到高</option>
    </select>
  </div>

  <!-- Tutor cards -->
  <div id="matchList" class="space-y-4"></div>

  <!-- Explainer -->
  <div class="mt-10 bg-white border border-amber-100 rounded-2xl p-6">
    <h3 class="serif text-lg font-bold mb-3">🤔 为什么匹配度重要？</h3>
    <p class="text-sm text-gray-600 leading-relaxed">
      其他平台推荐老师只看"教过小学数学"——但小学数学有很多版本：人教版、北师大版、苏教版。
      <span class="font-semibold">我们的老师每一位都上传了自己教过的教材版本</span>，确保推荐的老师真的懂您孩子课本上的每一页。
    </p>
  </div>
</div>

<script>
const MATCHES = [
  {
    name: "赵娟", subject: "小学语数", dist: "1.2km",
    school: "云师大 · 汉语言文学 · 在职一级教师",
    match: 98, price: 160, rating: 5.0, reviews: 210, years: 10,
    bookExp: "教授人教版小学数学5年级 8年",
    highlight: "曾任教昆明春城小学，深度参与人教版数学教辅编写",
    tags: ["人教版精通", "西山区", "一级教师", "🎁 首课免费"],
    color: "linear-gradient(135deg,#16a34a,#14532d)"
  },
  {
    name: "李明", subject: "小初数学", dist: "2.8km",
    school: "云南师范大学 · 数学研究生",
    match: 92, price: 180, rating: 4.9, reviews: 127,
    years: 5, bookExp: "熟悉人教版小学数学各册",
    highlight: "擅长知识体系梳理，用思维导图帮孩子理清概念",
    tags: ["人教版", "五华区", "云师大", "🎁 首课免费"],
    color: "linear-gradient(135deg,#C8102E,#7f1d1d)"
  },
  {
    name: "王磊", subject: "小学数学", dist: "3.5km",
    school: "云南民族大学 · 退休教师",
    match: 89, price: 120, rating: 4.8, reviews: 167,
    years: 25, bookExp: "教授人教版小学数学 20+ 年",
    highlight: "退休返聘，耐心好，价格亲民，深受家长信赖",
    tags: ["经验丰富", "盘龙区", "25年教龄", "🎁 首课免费"],
    color: "linear-gradient(135deg,#ea580c,#9a3412)"
  },
  {
    name: "陈莹", subject: "小学全科", dist: "4.1km",
    school: "云南大学 · 教育学硕士",
    match: 85, price: 150, rating: 4.7, reviews: 92,
    years: 4, bookExp: "熟悉人教版 + 北师大版",
    highlight: "善于沟通，家长反馈孩子学习积极性明显提升",
    tags: ["教育学硕士", "官渡区", "🎁 首课免费"],
    color: "linear-gradient(135deg,#0ea5e9,#075985)"
  },
  {
    name: "刘洋", subject: "小学数学", dist: "5.6km",
    school: "华中师大 · 教育技术本科",
    match: 80, price: 140, rating: 4.8, reviews: 68,
    years: 3, bookExp: "教过人教版小学数学5-6年级",
    highlight: "年轻老师，擅长用游戏和 iPad 工具教学",
    tags: ["年轻活力", "呈贡区", "🎁 首课免费"],
    color: "linear-gradient(135deg,#8b5cf6,#4c1d95)"
  }
];

const list = document.getElementById('matchList');
MATCHES.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'bg-white rounded-2xl border border-amber-100 p-5 hover:shadow-lg transition';
  card.innerHTML = `
    <div class="flex gap-5">
      <!-- Avatar -->
      <div class="flex-shrink-0 text-center">
        <div class="w-20 h-20 rounded-2xl flex items-center justify-center font-bold text-white text-3xl serif" style="background:${t.color}">${t.name[0]}</div>
        <div class="mt-2">
          <div class="text-[10px] text-gray-500">匹配度</div>
          <div class="text-lg font-bold brand-green">${t.match}%</div>
        </div>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <div class="font-bold text-lg">${t.name} 老师</div>
          ${i===0 ? '<span class="stamp">🏆 最佳匹配</span>' : ''}
          <span class="text-xs text-gray-500 ml-auto">📍 ${t.dist}</span>
        </div>
        <div class="text-sm text-gray-600 mb-2">${t.school}</div>

        <div class="match-bar mb-3"><div style="width:${t.match}%"></div></div>

        <div class="bg-amber-50 border-l-4 border-amber-400 p-3 rounded mb-3">
          <div class="text-xs font-semibold text-amber-900 mb-1">📘 本书教学经历</div>
          <div class="text-sm text-amber-900">${t.bookExp}</div>
        </div>

        <div class="text-sm text-gray-700 mb-3 italic">"${t.highlight}"</div>

        <div class="flex flex-wrap gap-1 mb-3">
          ${t.tags.map(tag => `<span class="text-xs px-2 py-0.5 ${tag.includes('🎁') ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-800'} rounded">${tag}</span>`).join('')}
        </div>

        <div class="flex items-end justify-between pt-3 border-t">
          <div>
            <div class="text-xs text-yellow-600">⭐ ${t.rating} (${t.reviews}) · 教龄 ${t.years}年</div>
            <div class="text-xl font-bold serif mt-1">¥${t.price}<span class="text-xs text-gray-400 font-normal">/课时 · 老师自主定价</span></div>
          </div>
          <div class="flex gap-2">
            <button class="text-sm px-4 py-2 border border-gray-200 rounded-lg">查看详情</button>
            <button class="text-sm px-4 py-2 bg-brand-green text-white rounded-lg font-semibold" onclick="alert('演示版本：扫码添加${t.name}老师微信')">💬 直接联系</button>
          </div>
        </div>
      </div>
    </div>
  `;
  list.appendChild(card);
});
</script>
</body>
</html>
