<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>找老师 · 学伴</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #FDF9F0; color: #1f2937; }
  .serif { font-family: "Noto Serif SC", serif; }
  .brand-green { color: #1a5d3a; }
  .bg-brand-green { background-color: #1a5d3a; }
  .brand-orange { color: #D97706; }
  .bg-brand-orange { background-color: #D97706; }
  .chip { cursor: pointer; transition: all .15s; }
  .chip:hover { border-color: #1a5d3a; }
  .chip.active { background: #1a5d3a; color: white; border-color: #1a5d3a; }
  .fav-btn { transition: transform .15s; cursor: pointer; }
  .fav-btn:hover { transform: scale(1.2); }
  .card-enter { animation: slideIn .3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav class="bg-white border-b border-amber-100 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-10 h-10 rounded-lg bg-brand-green text-white flex items-center justify-center font-bold serif text-xl">学</div>
      <div>
        <div class="serif font-bold text-lg brand-green">学伴</div>
        <div class="text-[10px] text-gray-500 -mt-1">每本书都有一位好老师</div>
      </div>
    </a>
    <div class="hidden md:flex gap-6 text-sm">
      <a href="index.html" class="text-gray-700">首页</a>
      <a href="books.html" class="text-gray-700">教材库</a>
      <a href="tutors.html" class="font-semibold brand-green">找老师</a>
      <a href="dashboard.html" class="text-gray-700">我的学伴</a>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="showFavorites()" class="relative text-gray-600 hover:text-red-500">
        ❤️
        <span id="favBadge" class="absolute -top-2 -right-3 bg-red-500 text-white text-[10px] min-w-[18px] h-[18px] rounded-full hidden items-center justify-center px-1">0</span>
      </button>
      <div class="w-9 h-9 rounded-full bg-amber-500 text-white flex items-center justify-center font-bold">王</div>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8">

  <!-- Breadcrumbs + title -->
  <div class="text-xs text-gray-500 mb-3">
    <a href="index.html" class="hover:brand-green">首页</a> / <span class="text-gray-700">找老师</span>
  </div>
  <div class="flex justify-between items-end mb-6">
    <div>
      <h1 class="serif text-3xl font-bold">云南本地好老师</h1>
      <p class="text-sm text-gray-500 mt-1">共 <span id="count" class="brand-green font-bold">24</span> 位认证老师 · 所有课时费 100% 归老师 · 0 平台抽成</p>
    </div>
    <div class="flex gap-2">
      <button onclick="resetFilters()" class="text-xs px-3 py-2 border border-gray-200 rounded-lg hover:bg-gray-50">🔄 清除筛选</button>
    </div>
  </div>

  <!-- Search bar -->
  <div class="bg-white rounded-2xl shadow-sm border border-amber-100 p-3 flex gap-2 mb-6">
    <div class="flex-1 flex items-center gap-2 px-3">
      <span class="text-gray-400">🔍</span>
      <input id="searchInput" type="text" placeholder="搜索老师姓名、学校、学科、教材..." class="flex-1 py-2 text-sm border-0 focus:outline-none" />
    </div>
    <select id="sortSelect" class="px-4 py-2 text-sm border-0 bg-gray-50 rounded-lg focus:outline-none">
      <option value="rating">⭐ 好评优先</option>
      <option value="matchScore">🎯 匹配度优先</option>
      <option value="priceAsc">💰 价格低到高</option>
      <option value="priceDesc">💰 价格高到低</option>
      <option value="years">📅 教龄优先</option>
      <option value="reviews">💬 评价多优先</option>
    </select>
  </div>

  <div class="grid lg:grid-cols-[280px_1fr] gap-6">

    <!-- Filter sidebar -->
    <aside class="bg-white rounded-2xl p-5 h-fit lg:sticky lg:top-24 border border-amber-100">

      <!-- Category -->
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-600 mb-3 uppercase tracking-wide">学科类别</div>
        <div class="flex flex-wrap gap-2" id="categoryChips">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="category" data-value="all">全部</span>
        </div>
      </div>

      <!-- Subject -->
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-600 mb-3 uppercase tracking-wide">科目</div>
        <div class="flex flex-wrap gap-2" id="subjectChips">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="subject" data-value="all">全部</span>
        </div>
      </div>

      <!-- Grade -->
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-600 mb-3 uppercase tracking-wide">年级</div>
        <div class="flex flex-wrap gap-2" id="gradeChips">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="grade" data-value="all">全部</span>
        </div>
      </div>

      <!-- District -->
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-600 mb-3 uppercase tracking-wide">区域 · 昆明</div>
        <div class="flex flex-wrap gap-2" id="districtChips">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="district" data-value="all">全部</span>
        </div>
      </div>

      <!-- Price -->
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-600 mb-3 uppercase tracking-wide">课时价格</div>
        <div class="flex flex-wrap gap-2" id="priceChips">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="all">不限</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="low">¥120-150</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="mid">¥150-200</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="high">¥200-250</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="premium">¥250+</span>
        </div>
      </div>

      <!-- Experience -->
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-600 mb-3 uppercase tracking-wide">教龄</div>
        <div class="flex flex-wrap gap-2" id="yearsChips">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="years" data-value="all">不限</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="years" data-value="3+">3 年+</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="years" data-value="5+">5 年+</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="years" data-value="10+">10 年+</span>
        </div>
      </div>

      <!-- Verification -->
      <div class="pt-5 border-t">
        <div class="text-xs font-semibold text-gray-600 mb-3 uppercase tracking-wide">认证</div>
        <label class="flex items-center gap-2 text-sm mb-2 cursor-pointer">
          <input type="checkbox" id="filterInService" class="accent-green-700" />
          <span>在职教师</span>
        </label>
        <label class="flex items-center gap-2 text-sm mb-2 cursor-pointer">
          <input type="checkbox" id="filterTeachingCert" class="accent-green-700" />
          <span>持教师资格证</span>
        </label>
        <label class="flex items-center gap-2 text-sm mb-2 cursor-pointer">
          <input type="checkbox" id="filterFeatured" class="accent-green-700" />
          <span>⭐ 学伴推荐老师</span>
        </label>
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" id="filterFavOnly" class="accent-green-700" />
          <span>❤️ 我收藏的</span>
        </label>
      </div>
    </aside>

    <!-- Results -->
    <section>
      <!-- Top notice -->
      <div class="bg-green-50 border border-green-200 rounded-xl p-3 mb-5 flex items-center gap-2 text-xs brand-green">
        <span>🛡️</span>
        <span>所有老师均经身份证+学信网+教师证三重核验 · <a href="compliance.html" class="underline">查看合规披露</a></span>
      </div>

      <div id="tutorGrid" class="grid md:grid-cols-2 gap-5"></div>
      <div id="noResults" class="hidden bg-white rounded-2xl border border-amber-100 p-10 text-center">
        <div class="text-5xl mb-4">🔍</div>
        <div class="font-semibold mb-2">没有匹配的老师</div>
        <div class="text-sm text-gray-500">试试调整筛选条件或点击"清除筛选"</div>
        <button onclick="resetFilters()" class="mt-5 bg-brand-green text-white px-5 py-2 rounded-lg text-sm">清除所有筛选</button>
      </div>
    </section>
  </div>
</div>

<!-- Favorites modal -->
<div id="favModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
  <div class="bg-white rounded-3xl max-w-lg w-full p-6 max-h-[80vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h3 class="serif text-xl font-bold">❤️ 我的收藏</h3>
      <button onclick="hideFavorites()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
    </div>
    <div id="favList"></div>
  </div>
</div>

<script src="data.js"></script>
<script>

// ============== STATE ==============
const state = {
  filters: {
    category: 'all',
    subject: 'all',
    grade: 'all',
    district: 'all',
    price: 'all',
    years: 'all'
  },
  flags: {
    inService: false,
    teachingCert: false,
    featured: false,
    favOnly: false
  },
  search: '',
  sort: 'rating'
};

// ============== INIT FILTERS ==============
function initChips() {
  // Category chips
  const catEl = document.getElementById('categoryChips');
  CATEGORIES.forEach(c => {
    const chip = document.createElement('span');
    chip.className = 'chip px-3 py-1 border border-gray-200 rounded-full text-xs';
    chip.textContent = `${c.icon} ${c.label}`;
    chip.dataset.filter = 'category';
    chip.dataset.value = c.key;
    catEl.appendChild(chip);
  });

  // Subject chips
  const subEl = document.getElementById('subjectChips');
  SUBJECTS.forEach(s => {
    const chip = document.createElement('span');
    chip.className = 'chip px-3 py-1 border border-gray-200 rounded-full text-xs';
    chip.textContent = s;
    chip.dataset.filter = 'subject';
    chip.dataset.value = s;
    subEl.appendChild(chip);
  });

  // Grade chips
  const gEl = document.getElementById('gradeChips');
  GRADES.forEach(g => {
    const chip = document.createElement('span');
    chip.className = 'chip px-3 py-1 border border-gray-200 rounded-full text-xs';
    chip.textContent = g;
    chip.dataset.filter = 'grade';
    chip.dataset.value = g;
    gEl.appendChild(chip);
  });

  // District chips
  const dEl = document.getElementById('districtChips');
  DISTRICTS.forEach(d => {
    const chip = document.createElement('span');
    chip.className = 'chip px-3 py-1 border border-gray-200 rounded-full text-xs';
    chip.textContent = d;
    chip.dataset.filter = 'district';
    chip.dataset.value = d;
    dEl.appendChild(chip);
  });

  // Wire all chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const f = chip.dataset.filter;
      document.querySelectorAll(`.chip[data-filter="${f}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.filters[f] = chip.dataset.value;
      render();
    });
  });

  // Wire checkboxes
  ['filterInService','filterTeachingCert','filterFeatured','filterFavOnly'].forEach(id => {
    document.getElementById(id).addEventListener('change', (e) => {
      const key = id.replace('filter','');
      const camelKey = key.charAt(0).toLowerCase() + key.slice(1);
      state.flags[camelKey] = e.target.checked;
      render();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.search = e.target.value.toLowerCase();
    render();
  });

  // Sort
  document.getElementById('sortSelect').addEventListener('change', (e) => {
    state.sort = e.target.value;
    render();
  });
}

// ============== FILTER + SORT LOGIC ==============
function priceBucket(p) {
  if (p < 150) return 'low';
  if (p < 200) return 'mid';
  if (p < 250) return 'high';
  return 'premium';
}

function yearsBucket(y) {
  if (y >= 10) return ['3+','5+','10+'];
  if (y >= 5) return ['3+','5+'];
  if (y >= 3) return ['3+'];
  return [];
}

function applyFilters() {
  let list = TUTORS.slice();

  // Category
  if (state.filters.category !== 'all') {
    list = list.filter(t => t.category === state.filters.category);
  }
  // Subject
  if (state.filters.subject !== 'all') {
    list = list.filter(t => t.subjects.includes(state.filters.subject));
  }
  // Grade
  if (state.filters.grade !== 'all') {
    list = list.filter(t => t.grades.includes(state.filters.grade));
  }
  // District
  if (state.filters.district !== 'all') {
    list = list.filter(t => t.district === state.filters.district);
  }
  // Price
  if (state.filters.price !== 'all') {
    list = list.filter(t => priceBucket(t.price) === state.filters.price);
  }
  // Years
  if (state.filters.years !== 'all') {
    list = list.filter(t => yearsBucket(t.years).includes(state.filters.years));
  }
  // Checkboxes
  if (state.flags.inService) {
    list = list.filter(t => t.verified.some(v => v.includes('在职') || v.includes('一级') || v.includes('特级')));
  }
  if (state.flags.teachingCert) {
    list = list.filter(t => t.verified.includes('教师资格证'));
  }
  if (state.flags.featured) {
    list = list.filter(t => t.featured);
  }
  if (state.flags.favOnly) {
    const favs = getFavorites();
    list = list.filter(t => favs.includes(t.id));
  }
  // Search
  if (state.search) {
    list = list.filter(t => {
      return (
        t.name.toLowerCase().includes(state.search) ||
        t.school.toLowerCase().includes(state.search) ||
        t.subjects.some(s => s.toLowerCase().includes(state.search)) ||
        t.books.some(b => b.toLowerCase().includes(state.search)) ||
        t.tags.some(tg => tg.toLowerCase().includes(state.search))
      );
    });
  }

  // Sort
  switch (state.sort) {
    case 'rating':      list.sort((a,b) => b.rating - a.rating); break;
    case 'matchScore':  list.sort((a,b) => (b.featured?1:0) - (a.featured?1:0) || b.rating - a.rating); break;
    case 'priceAsc':    list.sort((a,b) => a.price - b.price); break;
    case 'priceDesc':   list.sort((a,b) => b.price - a.price); break;
    case 'years':       list.sort((a,b) => b.years - a.years); break;
    case 'reviews':     list.sort((a,b) => b.reviews - a.reviews); break;
  }

  return list;
}

// ============== RENDER ==============
function render() {
  const list = applyFilters();
  const grid = document.getElementById('tutorGrid');
  const noRes = document.getElementById('noResults');

  document.getElementById('count').textContent = list.length;

  if (list.length === 0) {
    grid.classList.add('hidden');
    noRes.classList.remove('hidden');
  } else {
    grid.classList.remove('hidden');
    noRes.classList.add('hidden');
  }

  grid.innerHTML = '';
  list.forEach(t => {
    const favNow = isFavorited(t.id);
    const card = document.createElement('div');
    card.className = 'bg-white rounded-2xl border border-amber-100 p-5 hover:shadow-xl hover:-translate-y-0.5 transition card-enter';
    card.innerHTML = `
      <div class="flex items-start gap-3 mb-3">
        <a href="tutor.html?id=${t.id}" class="flex-shrink-0">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center font-bold text-white text-2xl serif" style="background:${t.color}">${t.name[0]}</div>
        </a>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <a href="tutor.html?id=${t.id}" class="font-bold hover:brand-green">${t.name} 老师</a>
            ${t.featured ? '<span class="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-bold">⭐ 推荐</span>' : ''}
            ${t.verified.includes('在职教师') ? '<span class="text-[10px] bg-green-100 text-green-800 px-1.5 py-0.5 rounded">在职</span>' : ''}
          </div>
          <div class="text-xs text-gray-500 truncate">${t.school}</div>
          <div class="text-xs mt-1 flex items-center gap-2 flex-wrap">
            <span class="text-yellow-600">⭐ ${t.rating}</span>
            <span class="text-gray-400">(${t.reviews})</span>
            <span class="text-gray-500">·</span>
            <span class="text-gray-600">教龄 ${t.years} 年</span>
          </div>
        </div>
        <button class="fav-btn text-xl" data-id="${t.id}" onclick="event.stopPropagation(); toggleFav(${t.id}, this)" title="${favNow ? '取消收藏' : '收藏'}">${favNow ? '❤️' : '🤍'}</button>
      </div>

      <div class="flex flex-wrap gap-1 mb-3">
        ${t.tags.slice(0, 3).map(tag => `<span class="text-[11px] px-2 py-0.5 bg-green-50 text-green-800 rounded">${tag}</span>`).join('')}
      </div>

      ${t.books.length > 0 ? `
        <div class="bg-amber-50 border-l-2 border-amber-400 rounded-r p-2 mb-3 text-xs">
          <div class="font-semibold text-amber-900 mb-0.5">📘 精通教材（${t.books.length}）</div>
          <div class="text-amber-800">${t.books.slice(0,2).join(' · ')}${t.books.length > 2 ? ` · +${t.books.length-2}` : ''}</div>
        </div>
      ` : `
        <div class="bg-purple-50 border-l-2 border-purple-300 rounded-r p-2 mb-3 text-xs">
          <div class="font-semibold text-purple-900">🎨 素质教育 · 无教材限制</div>
        </div>
      `}

      <div class="flex items-end justify-between pt-3 border-t">
        <div>
          <div class="text-xl font-bold serif">¥${t.price}<span class="text-xs text-gray-400 font-normal">/课时</span></div>
          <div class="text-[10px] text-gray-400">📍 ${t.district} · ${t.mode.join('/')}</div>
        </div>
        <a href="tutor.html?id=${t.id}" class="text-sm bg-brand-green text-white px-4 py-2 rounded-lg font-semibold">查看详情 →</a>
      </div>
    `;
    grid.appendChild(card);
  });

  updateFavBadge();
}

// ============== FAVORITES ==============
function toggleFav(id, btnEl) {
  const nowFav = toggleFavorite(id);
  btnEl.textContent = nowFav ? '❤️' : '🤍';
  btnEl.title = nowFav ? '取消收藏' : '收藏';
  updateFavBadge();
}

function updateFavBadge() {
  const count = getFavorites().length;
  const badge = document.getElementById('favBadge');
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove('hidden');
    badge.classList.add('flex');
  } else {
    badge.classList.add('hidden');
    badge.classList.remove('flex');
  }
}

function showFavorites() {
  const favs = getFavorites();
  const list = document.getElementById('favList');
  if (favs.length === 0) {
    list.innerHTML = '<div class="text-center py-10 text-gray-400">您还没有收藏任何老师<br/><span class="text-xs">点击老师卡片上的 🤍 添加</span></div>';
  } else {
    list.innerHTML = favs.map(id => {
      const t = getTutorById(id);
      if (!t) return '';
      return `
        <a href="tutor.html?id=${t.id}" class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-lg border-b last:border-0">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-white text-lg serif" style="background:${t.color}">${t.name[0]}</div>
          <div class="flex-1">
            <div class="font-semibold text-sm">${t.name} 老师</div>
            <div class="text-xs text-gray-500">${t.school}</div>
          </div>
          <div class="text-sm font-bold serif brand-green">¥${t.price}</div>
        </a>
      `;
    }).join('');
  }
  document.getElementById('favModal').classList.remove('hidden');
  document.getElementById('favModal').classList.add('flex');
}

function hideFavorites() {
  document.getElementById('favModal').classList.add('hidden');
  document.getElementById('favModal').classList.remove('flex');
}

// ============== RESET ==============
function resetFilters() {
  state.filters = { category:'all', subject:'all', grade:'all', district:'all', price:'all', years:'all' };
  state.flags = { inService:false, teachingCert:false, featured:false, favOnly:false };
  state.search = '';
  state.sort = 'rating';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.chip[data-value="all"]').forEach(c => c.classList.add('active'));
  document.querySelectorAll('aside input[type="checkbox"]').forEach(cb => cb.checked = false);
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'rating';
  render();
}

// ============== GO ==============
initChips();
render();
</script>
</body>
</html>
