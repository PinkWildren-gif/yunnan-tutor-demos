<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>找老师 — 优师荟</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  .serif { font-family: "Noto Serif SC", "STSong", serif; }
  .brand { color: #C8102E; }
  .bg-brand { background-color: #C8102E; }
  .seal { display: inline-flex; align-items: center; justify-content: center; background: #C8102E; color: white; font-weight: 700; padding: 4px 10px; border-radius: 4px; letter-spacing: 2px; }
  .chip { cursor: pointer; transition: all .15s; }
  .chip.active { background: #C8102E; color: white; border-color: #C8102E; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Nav -->
<nav class="border-b bg-white sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="seal serif">优</div>
      <div class="font-bold text-lg serif">优师荟</div>
    </a>
    <div class="hidden md:flex gap-6 text-sm text-gray-700">
      <a href="tutors.html" class="brand font-semibold">找老师</a>
      <a href="#" class="hover:text-[#C8102E]">学科辅导</a>
      <a href="#" class="hover:text-[#C8102E]">素质教育</a>
      <a href="#" class="hover:text-[#C8102E]">艺术音乐</a>
    </div>
    <div class="flex gap-3">
      <a href="login.html" class="text-sm">登录</a>
      <a href="login.html" class="text-sm px-4 py-2 bg-brand text-white rounded">注册</a>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8">
  <!-- Breadcrumbs -->
  <div class="text-xs text-gray-500 mb-4">
    <a href="index.html" class="hover:text-[#C8102E]">首页</a> / <span>找老师</span> / <span class="text-gray-700">云南 · 昆明</span>
  </div>

  <h1 class="serif text-3xl font-bold mb-2">云南昆明 · 优秀老师</h1>
  <p class="text-gray-500 text-sm mb-8">共为您找到 <span class="brand font-semibold" id="count">8</span> 位认证老师 · 所有课时费100%归老师</p>

  <div class="grid lg:grid-cols-[260px_1fr] gap-6">
    <!-- Filters -->
    <aside class="bg-white rounded-xl p-5 h-fit sticky top-20 border border-gray-100">
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-500 mb-2">学科类别</div>
        <div class="flex flex-wrap gap-2">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="category" data-value="all">全部</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="category" data-value="学科">学科辅导</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="category" data-value="艺术">艺术音乐</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="category" data-value="素质">素质教育</span>
        </div>
      </div>
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-500 mb-2">年级</div>
        <div class="flex flex-wrap gap-2">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="grade" data-value="all">全部</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="grade" data-value="小学">小学</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="grade" data-value="初中">初中</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="grade" data-value="高中">高中</span>
        </div>
      </div>
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-500 mb-2">区域 · 昆明</div>
        <div class="flex flex-wrap gap-2">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="district" data-value="all">全部</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="district" data-value="五华区">五华区</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="district" data-value="盘龙区">盘龙区</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="district" data-value="官渡区">官渡区</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="district" data-value="西山区">西山区</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="district" data-value="呈贡区">呈贡区</span>
        </div>
      </div>
      <div class="mb-5">
        <div class="text-xs font-semibold text-gray-500 mb-2">课时价格</div>
        <div class="flex flex-wrap gap-2">
          <span class="chip active px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="all">不限</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="low">¥100-150</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="mid">¥150-200</span>
          <span class="chip px-3 py-1 border border-gray-200 rounded-full text-xs" data-filter="price" data-value="high">¥200+</span>
        </div>
      </div>
      <div class="pt-4 border-t">
        <div class="text-xs text-gray-500 mb-2">排序</div>
        <select id="sort" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
          <option value="rating">好评优先</option>
          <option value="price-low">价格由低到高</option>
          <option value="price-high">价格由高到低</option>
          <option value="years">经验优先</option>
        </select>
      </div>
    </aside>

    <!-- Results -->
    <section>
      <div id="tutorList" class="grid md:grid-cols-2 gap-5"></div>
    </section>
  </div>
</div>

<script src="data.js"></script>
<script>
  let filters = { category: 'all', grade: 'all', district: 'all', price: 'all' };
  let sort = 'rating';

  function priceBucket(p){
    if (p < 150) return 'low';
    if (p < 200) return 'mid';
    return 'high';
  }

  function render() {
    let list = TUTORS.filter(t => {
      if (filters.category !== 'all' && t.category !== filters.category) return false;
      if (filters.grade !== 'all' && !t.grades.includes(filters.grade)) return false;
      if (filters.district !== 'all' && t.district !== filters.district) return false;
      if (filters.price !== 'all' && priceBucket(t.price) !== filters.price) return false;
      return true;
    });
    if (sort === 'rating') list.sort((a,b)=>b.rating-a.rating);
    if (sort === 'price-low') list.sort((a,b)=>a.price-b.price);
    if (sort === 'price-high') list.sort((a,b)=>b.price-a.price);
    if (sort === 'years') list.sort((a,b)=>b.years-a.years);

    document.getElementById('count').textContent = list.length;
    const el = document.getElementById('tutorList');
    el.innerHTML = '';
    list.forEach(t => {
      const a = document.createElement('a');
      a.href = `tutor.html?id=${t.id}`;
      a.className = 'bg-white rounded-xl p-5 border border-gray-100 hover:shadow-lg hover:-translate-y-0.5 transition';
      a.innerHTML = `
        <div class="flex gap-4">
          <div class="w-16 h-16 flex-shrink-0 rounded-full flex items-center justify-center font-bold text-white text-xl" style="background:${t.color}">${t.name[0]}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2">
              <div class="font-bold">${t.name} 老师</div>
              <span class="text-xs text-green-700 bg-green-50 px-1.5 py-0.5 rounded">✓ 认证</span>
            </div>
            <div class="text-xs text-gray-500 truncate">${t.school}</div>
            <div class="text-xs text-yellow-600 mt-1">⭐ ${t.rating} (${t.reviews}) · 教龄 ${t.years}年 · 已教 ${t.students}+</div>
            <div class="flex flex-wrap gap-1 mt-2">
              ${t.tags.slice(0,3).map(tag => `<span class="text-xs px-2 py-0.5 bg-red-50 text-[#C8102E] rounded">${tag}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="flex items-end justify-between mt-4 pt-3 border-t">
          <div>
            <div class="text-xl font-bold serif">¥${t.price}<span class="text-xs text-gray-400 font-normal">/课时</span></div>
            <div class="text-[10px] text-gray-400">老师自主定价 · 平台0抽成</div>
          </div>
          <div class="text-xs text-gray-500">📍 ${t.district}</div>
        </div>
      `;
      el.appendChild(a);
    });
    if (list.length === 0) {
      el.innerHTML = '<div class="col-span-full text-center text-gray-400 py-20">没有匹配的老师，试试调整筛选条件</div>';
    }
  }

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const f = chip.dataset.filter;
      document.querySelectorAll(`.chip[data-filter="${f}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      filters[f] = chip.dataset.value;
      render();
    });
  });
  document.getElementById('sort').addEventListener('change', e => { sort = e.target.value; render(); });
  render();
</script>
</body>
</html>
