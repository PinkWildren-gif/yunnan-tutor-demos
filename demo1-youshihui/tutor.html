<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>老师详情 — 优师荟</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  .serif { font-family: "Noto Serif SC", "STSong", serif; }
  .brand { color: #C8102E; }
  .bg-brand { background-color: #C8102E; }
  .seal { display: inline-flex; align-items: center; justify-content: center; background: #C8102E; color: white; font-weight: 700; padding: 4px 10px; border-radius: 4px; letter-spacing: 2px; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">

<nav class="border-b bg-white sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="seal serif">优</div>
      <div class="font-bold text-lg serif">优师荟</div>
    </a>
    <div class="hidden md:flex gap-6 text-sm text-gray-700">
      <a href="tutors.html" class="hover:text-[#C8102E]">找老师</a>
      <a href="#" class="hover:text-[#C8102E]">学科辅导</a>
      <a href="#" class="hover:text-[#C8102E]">素质教育</a>
    </div>
    <div class="flex gap-3">
      <a href="#" class="text-sm">登录</a>
      <a href="#" class="text-sm px-4 py-2 bg-brand text-white rounded">注册</a>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-8">
  <div class="text-xs text-gray-500 mb-4">
    <a href="index.html" class="hover:text-[#C8102E]">首页</a> /
    <a href="tutors.html" class="hover:text-[#C8102E]">找老师</a> /
    <span id="crumb" class="text-gray-700"></span>
  </div>

  <div id="profile" class="grid lg:grid-cols-[1fr_320px] gap-6"></div>
</div>

<script src="data.js"></script>
<script>
  const id = parseInt(new URLSearchParams(location.search).get('id') || '1');
  const t = TUTORS.find(x => x.id === id) || TUTORS[0];
  document.getElementById('crumb').textContent = `${t.name} 老师`;
  document.title = `${t.name}老师 — 优师荟`;

  const reviews = REVIEWS.filter(r => r.tutorId === t.id);
  const reviewHtml = reviews.length
    ? reviews.map(r => `
        <div class="py-4 border-b last:border-0">
          <div class="flex justify-between items-center mb-2">
            <div class="font-semibold text-sm">${r.parent}</div>
            <div class="text-xs text-gray-400">${r.date}</div>
          </div>
          <div class="text-yellow-500 text-xs mb-2">${'⭐'.repeat(r.rating)}</div>
          <div class="text-sm text-gray-600 leading-relaxed">${r.text}</div>
        </div>
      `).join('')
    : `<div class="py-4 text-sm text-gray-400">暂无评价</div>`;

  document.getElementById('profile').innerHTML = `
    <div class="space-y-5">
      <!-- Header card -->
      <div class="bg-white rounded-2xl p-6 border border-gray-100">
        <div class="flex items-start gap-5">
          <div class="w-24 h-24 flex-shrink-0 rounded-2xl flex items-center justify-center font-bold text-white text-4xl serif" style="background:${t.color}">${t.name[0]}</div>
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <h1 class="serif text-2xl font-bold">${t.name} 老师</h1>
              <span class="text-xs text-green-700 bg-green-50 px-2 py-0.5 rounded">✓ 实名认证</span>
            </div>
            <div class="text-sm text-gray-600 mb-2">${t.school}</div>
            <div class="flex flex-wrap gap-2 text-xs">
              <span class="text-yellow-600">⭐ ${t.rating} (${t.reviews}条评价)</span>
              <span class="text-gray-500">·</span>
              <span class="text-gray-600">教龄 ${t.years} 年</span>
              <span class="text-gray-500">·</span>
              <span class="text-gray-600">已教 ${t.students}+ 学生</span>
              <span class="text-gray-500">·</span>
              <span class="text-gray-600">📍 ${t.city} ${t.district}</span>
            </div>
            <div class="flex flex-wrap gap-1 mt-3">
              ${t.tags.map(tag => `<span class="text-xs px-2 py-1 bg-red-50 text-[#C8102E] rounded">${tag}</span>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <!-- Bio -->
      <div class="bg-white rounded-2xl p-6 border border-gray-100">
        <h2 class="serif text-lg font-bold mb-3">老师简介</h2>
        <p class="text-sm text-gray-700 leading-relaxed mb-4">${t.bio}</p>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div class="bg-gray-50 rounded-lg p-3">
            <div class="text-xs text-gray-500 mb-1">教学风格</div>
            <div class="font-semibold">${t.style}</div>
          </div>
          <div class="bg-gray-50 rounded-lg p-3">
            <div class="text-xs text-gray-500 mb-1">适合年级</div>
            <div class="font-semibold">${t.grades.join(' · ')}</div>
          </div>
        </div>
      </div>

      <!-- Credentials -->
      <div class="bg-white rounded-2xl p-6 border border-gray-100">
        <h2 class="serif text-lg font-bold mb-3">资质证书</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
          ${t.verified.map(v => `
            <div class="flex items-center gap-2 p-3 border border-green-100 bg-green-50 rounded-lg">
              <span class="text-green-600">✓</span>
              <span class="text-sm text-green-800">${v}</span>
            </div>
          `).join('')}
        </div>
        <p class="text-xs text-gray-500 mt-4">所有资质均经平台人工核验。可在老师同意下查看原件扫描。</p>
      </div>

      <!-- Reviews -->
      <div class="bg-white rounded-2xl p-6 border border-gray-100">
        <h2 class="serif text-lg font-bold mb-3">家长评价 (${t.reviews})</h2>
        ${reviewHtml}
      </div>
    </div>

    <!-- Sticky CTA -->
    <aside class="lg:sticky lg:top-20 h-fit">
      <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
        <div class="text-center mb-4">
          <div class="text-4xl font-bold serif">¥${t.price}<span class="text-base text-gray-400 font-normal">/课时</span></div>
          <div class="text-xs text-gray-500 mt-1">老师自主定价 · 平台0抽成</div>
        </div>
        <div class="space-y-2 mb-5 text-xs text-gray-600">
          <div class="flex items-center gap-2">
            <span class="brand">✓</span> 首课可试听 30 分钟
          </div>
          <div class="flex items-center gap-2">
            <span class="brand">✓</span> 家长与老师直接沟通
          </div>
          <div class="flex items-center gap-2">
            <span class="brand">✓</span> 不满意随时终止
          </div>
        </div>
        <button class="w-full bg-brand text-white py-3 rounded-lg font-semibold text-sm mb-2" onclick="alert('演示版本：扫码联系老师微信')">
          📱 直接联系老师
        </button>
        <button class="w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold text-sm mb-4">
          ❤️ 收藏老师
        </button>
        <div class="pt-4 border-t">
          <div class="text-xs font-semibold text-gray-500 mb-2">服务保障</div>
          <ul class="text-xs text-gray-600 space-y-1">
            <li>• 实名学历三重核验</li>
            <li>• 首课不满意全额退款</li>
            <li>• 平台客服7x12小时支持</li>
          </ul>
        </div>
      </div>

      <div class="bg-red-50 border border-red-100 rounded-2xl p-5 mt-4">
        <div class="text-xs text-[#C8102E] font-semibold mb-2">📢 为什么我们不抽成？</div>
        <p class="text-xs text-gray-700 leading-relaxed">
          老师的劳动成果应全部归老师。我们通过付费会员和老师增值服务盈利，不从课时费中抽取一分钱。
        </p>
      </div>
    </aside>
  `;
</script>
</body>
</html>
